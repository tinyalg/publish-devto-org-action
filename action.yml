name: 'Publish to Dev.to Organization'
description: 'A GitHub Action to publish Markdown articles to Dev.to with Organization support.'
author: 'tinyalg'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  devto_api_key:
    description: 'Your Dev.to API Key (Passed via secrets)'
    required: true
  file_path:
    description: 'Path to the markdown file(s) to publish. Supports glob patterns like "posts/*.md"'
    required: true
  dry_run:
    description: 'If true, simulates the process without sending data to Dev.to'
    required: false
    default: 'false'
  use_hugo_draft:
    description: 'If true, reads Hugo-style "draft: true/false" instead of "published"'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Run Publish Script
      shell: bash
      env:
        DEVTO_API_KEY: ${{ inputs.devto_api_key }}
        DRY_RUN: ${{ inputs.dry_run }}
        USE_HUGO_DRAFT: ${{ inputs.use_hugo_draft }}
      run: |
        # Expand the provided path (e.g., posts/*.md) and iterate through each file
        for file in ${{ inputs.file_path }}; do
          # Check if the file actually exists to avoid errors on empty matches
          if [ -f "$file" ]; then
            echo "Processing $file..."
            bash ${{ github.action_path }}/publish.sh "$file"
            
            # Add a 5-second delay to avoid Dev.to API rate limits (Retry later)
            echo "Sleeping for 5 seconds to respect API limits..."
            sleep 5
          else
            echo "No files matched for $file"
          fi
        done